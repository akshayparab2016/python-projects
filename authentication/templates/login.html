{% extends 'base.html' %} {% block content %}

<form method="POST" class="card p-4">
  <h4>Login</h4>
  <input
    class="form-control mb-2"
    type="text"
    name="username"
    placeholder="Username"
    required
  />
  <input
    class="form-control mb-2"
    type="password"
    name="password"
    placeholder="Password"
    required
  />
  <button class="btn btn-success">Login</button>
</form>

<a href="/register">Create account</a>

{% endblock %}
