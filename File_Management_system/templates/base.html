<!doctype html>
<html>
  <head>
    <title>File Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        background: linear-gradient(135deg, #667eea, #764ba2, #ff758c);
        background-size: 400% 400%;
        animation: gradientBG 10s ease infinite;
        color: white;
      }

      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .card {
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
      }

      .navbar {
        background: rgba(0, 0, 0, 0.3) !important;
        backdrop-filter: blur(10px);
      }

      .file-name {
        word-break: break-word;
        white-space: normal;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="/">📁 File Manager</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#nav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto">
            {% if session.get('username') %}
            <li class="nav-item">
              <a class="btn btn-light me-2" href="/">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="btn btn-danger" href="/logout">Logout</a>
            </li>
            {% else %}
            <li class="nav-item">
              <a class="btn btn-outline-light me-2" href="/login">Login</a>
            </li>
            <li class="nav-item">
              <a class="btn btn-warning" href="/register">Register</a>
            </li>
            {% endif %}
          </ul>
        </div>
      </div>
    </nav>

    <div class="container py-4">
      {% with messages = get_flashed_messages() %} {% for msg in messages %}
      <div
        class="alert alert-info alert-dismissible fade show auto-dismiss"
        role="alert"
      >
        {{ msg }}
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>
      {% endfor %} {% endwith %} {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        setTimeout(function () {
          document.querySelectorAll(".alert").forEach(function (alert) {
            let bsAlert = new bootstrap.Alert(alert);
            bsAlert.close();
          });
        }, 3000);
      });
    </script>
  </body>
</html>
