<!doctype html>
<html lang="en">
  <head>
    <title>Recipe Finder</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="/">🍲 Recipe Finder</a>
        <a class="btn btn-outline-light" href="/favorites">Favorites</a>
      </div>
    </nav>
    <p />
    <!-- FLASH MESSAGES -->
    <div class="container mt-2">
      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %} {% for category, msg in messages %}
      <div class="alert alert-{{ category }} flash-msg">{{ msg }}</div>
      {% endfor %} {% endif %} {% endwith %}
    </div>

    <!-- Auto-hide flash messages after 3 seconds -->
    <script>
      setTimeout(() => {
        document
          .querySelectorAll(".flash-msg")
          .forEach((el) => (el.style.display = "none"));
      }, 3000);
    </script>

    <div class="container mt-4">{% block content %}{% endblock %}</div>
  </body>
</html>
