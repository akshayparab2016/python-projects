{% extends 'base.html' %} {% block content %}
<h2 class="mb-4">Your Favorites ❤️</h2>

{% if meals|length == 0 %}
<p style="font-size: 16.9px; padding: 8px" class="badge bg-danger text-dark">
  No favorites yet ⛌
</p>
{% endif %}

<div class="row g-4">
  {% for meal in meals %}
  <div class="col-lg-3 col-md-4 col-sm-6">
    <div class="card h-100">
      <img src="{{ meal.image }}" class="card-img-top" />
      <div class="card-body d-flex flex-column">
        <h6 style="color: white">{{ meal.name }}</h6>
        <div class="mt-auto">
          <a
            href="/recipe/{{ meal.id }}"
            class="btn btn-primary w-100 mb-2 btn-sm"
            >View</a
          >
          <a
            href="/remove_favorite/{{ meal.id }}"
            class="btn btn-danger w-100 btn-sm"
            >Remove</a
          >
        </div>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
